# ============================================================
# KAN appearance + geometry residual configuration (full model)
# ============================================================

project:
  name: "kan_refine_full"
  output_dir: "outputs/kan_app_geom"
  seed: 42
  device: "cuda"

data:
  dataset_type: "multiview"
  data_dir: "data/scene_01"
  image_width: 400
  image_height: 400
  white_background: true

gaussian:
  num_points: 10000
  init_method: "random"
  init_scale: 0.01
  init_opacity: 0.8

model:
  type: "kan"
  kan:
    input_dim: 6
    hidden_dims: [64, 64]
    output_dim: 10                   # 3 rgb + 1 opacity + 3 delta_mean + 3 delta_scale
    grid_size: 5
    spline_order: 3
    use_positional_encoding: true
    pe_num_freqs: 4
    predict_geometry_residuals: true

render:
  backend: "pytorch"
  near: 0.1
  far: 100.0
  chunk_size: 128
  multi_gpu: true

loss:
  rgb_weight: 1.0
  rgb_type: "l1"
  ssim_weight: 0.2
  depth_weight: 0.1
  sparsity_weight: 0.001
  geometry_weight: 0.01
  opacity_reg_weight: 0.001

train:
  num_iterations: 7000
  lr_means: 0.001
  lr_scales: 0.005
  lr_opacities: 0.01
  lr_colors: 0.01
  lr_rotations: 0.005
  lr_kan: 0.0005
  lr_decay_rate: 0.1
  lr_decay_steps: [4000, 6000]
  batch_size: 1
  log_interval: 100
  save_interval: 1000
  eval_interval: 500

eval:
  compute_lpips: true
  compute_chamfer: true
  export_gaussians: true
  export_renders: true
